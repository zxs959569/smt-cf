name: Cloudflare 优选IP自动更新

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  speedtest-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载并运行 CloudflareSpeedTest
        run: |
          mkdir -p cf_st
          cd cf_st
          echo "🚀 正在获取 CloudflareSpeedTest 最新版本..."

          # 获取最新下载链接
          LATEST_URL=$(curl -sL https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest | grep "browser_download_url" | grep "linux_amd64.tar.gz" | head -n 1 | cut -d '"' -f 4)
          
          # 下载
          wget -O cf_speedtest.tar.gz $LATEST_URL
          # 解压
          tar -zxf cf_speedtest.tar.gz
          
          # 自动识别主程序文件名并重命名
          rm cf_speedtest.tar.gz
          MAIN_BIN=$(ls -S | head -n 1)
          mv "$MAIN_BIN" CloudflareSpeedTest
          chmod +x CloudflareSpeedTest
          
          echo "🚀 开始测速..."
          # ---------------------------------------------------
          # 🔴 关键修改：去掉了 -sl (速度限制) 和 -tll (延迟限制)
          # -p 10 : 显示 10 个最快的 IP
          # -dn 5 : 对前 5 个进行下载测速
          # ---------------------------------------------------
          ./CloudflareSpeedTest -p 10 -dn 5 -o result.csv

          # 调试：打印当前目录文件，确保 result.csv 存在
          ls -lh 

          # 检查 result.csv 是否生成
          if [ ! -f "result.csv" ]; then
            echo "❌ 错误：result.csv 未生成。可能是所有 IP 都测速失败。"
            exit 1
          fi
          
          # 提取最快 IP (跳过第一行标题，取第二行第一列)
          BEST_IP=$(sed -n '2p' result.csv | cut -d, -f1)
          
          if [ -z "$BEST_IP" ]; then
            echo "⚠️ 获取到的 IP 为空，本次跳过。"
            exit 0
          fi
          
          echo "✅ 测速完成，最佳 IP: $BEST_IP"
          echo "BEST_IP=$BEST_IP" >> $GITHUB_ENV

      - name: 2. 调用 API 更新 DNS 记录
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          DOMAIN: "smt.zxs.cc.cd"
        run: |
          if [ -z "$BEST_IP" ]; then
            echo "没有 IP 需要更新"
            exit 0
          fi

          echo "🔍 查询域名 $DOMAIN 的 DNS 记录..."
          
          RECORD_INFO=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=$DOMAIN&type=A" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json")
          
          RECORD_ID=$(echo "$RECORD_INFO" | jq -r '.result[0].id')
          
          if [ "$RECORD_ID" == "null" ] || [ -z "$RECORD_ID" ]; then
            echo "❌ 错误: 找不到域名 $DOMAIN 的 A 记录。"
            echo "请先在 Cloudflare 后台手动添加一个 A 记录 (IP 随便填，如 1.1.1.1)！"
            exit 1
          fi
          
          echo "📝 更新记录 ID: $RECORD_ID -> IP: $BEST_IP"
          
          UPDATE_RESULT=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$RECORD_ID" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"A\",\"name\":\"$DOMAIN\",\"content\":\"$BEST_IP\",\"ttl\":60,\"proxied\":false}")
          
          SUCCESS=$(echo "$UPDATE_RESULT" | jq -r '.success')
          
          if [ "$SUCCESS" == "true" ]; then
             echo "🎉 DNS 更新成功: $DOMAIN -> $BEST_IP"
          else
             echo "❌ 更新失败:"
             echo "$UPDATE_RESULT"
             exit 1
          fi
